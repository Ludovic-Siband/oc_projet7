name: CI

on:
  pull_request:
  push:
    branches:
      - "**"
    tags-ignore:
      - "v*"

jobs:
  backend:
    name: Build & Test Backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: back
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Build and run tests
        run: ./gradlew --no-daemon clean build

      - name: Upload backend classes for Sonar
        uses: actions/upload-artifact@v4
        with:
          name: backend-classes
          path: back/build/classes/**
          if-no-files-found: error

  frontend:
    name: Build & Test Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: front
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: front/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run tests
        env:
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: npm test -- --watch=false --browsers=ChromeHeadlessNoSandbox --code-coverage

      - name: Upload frontend coverage for Sonar
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: front/coverage/microcrm/lcov.info
          if-no-files-found: error

  sonar:
    name: SonarQube Cloud Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs:
      - backend
      - frontend
    steps:
      - name: Validate SonarQube configuration
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
          SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
        run: |
          if [[ -z "${SONAR_TOKEN}" || -z "${SONAR_PROJECT_KEY}" || -z "${SONAR_ORGANIZATION}" ]]; then
            echo "Missing required Sonar configuration: SONAR_TOKEN, SONAR_PROJECT_KEY and SONAR_ORGANIZATION secrets." >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: front/package-lock.json

      - name: Download backend classes
        uses: actions/download-artifact@v4
        with:
          name: backend-classes
          path: back/build/classes

      - name: Download frontend coverage
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage
          path: front/coverage/microcrm

      - name: Run Sonar scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          args: >
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.sources=back/src/main/java,front/src
            -Dsonar.tests=back/src/test/java,front/src
            -Dsonar.test.inclusions=**/*Test.java,**/*Tests.java,**/*.spec.ts
            -Dsonar.java.binaries=back/build/classes
            -Dsonar.javascript.lcov.reportPaths=front/coverage/microcrm/lcov.info

      - name: Check quality gate
        uses: SonarSource/sonarqube-quality-gate-action@v1.2.0
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

  docker-validation:
    name: Validate Docker Compose Startup
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs:
      - backend
      - frontend
      - sonar
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and start containers
        run: docker compose up --build -d

      - name: Scan backend image with Trivy
        uses: aquasecurity/trivy-action@0.33.1
        env:
          TRIVY_DB_REPOSITORY: ghcr.io/aquasecurity/trivy-db:2
          TRIVY_JAVA_DB_REPOSITORY: ghcr.io/aquasecurity/trivy-java-db:1
        with:
          version: v0.69.2
          image-ref: orion-microcrm-back:local
          format: table
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL
          exit-code: "0"

      - name: Scan frontend image with Trivy
        uses: aquasecurity/trivy-action@0.33.1
        env:
          TRIVY_DB_REPOSITORY: ghcr.io/aquasecurity/trivy-db:2
          TRIVY_JAVA_DB_REPOSITORY: ghcr.io/aquasecurity/trivy-java-db:1
        with:
          version: v0.69.2
          image-ref: orion-microcrm-front:local
          format: table
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL
          exit-code: "0"

      - name: Wait for backend
        run: |
          for i in {1..45}; do
            if curl -fsS http://localhost:8080/persons > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Backend did not become ready in time." >&2
          exit 1

      - name: Wait for frontend
        run: |
          for i in {1..45}; do
            if curl -fsS http://localhost:80 > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Frontend did not become ready in time." >&2
          exit 1

      - name: Shutdown containers
        if: always()
        run: docker compose down --volumes --remove-orphans
