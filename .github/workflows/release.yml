name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    name: Build, Publish and Release
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
      packages: write
    steps:
      - name: Validate tag format
        env:
          TAG: ${{ github.ref_name }}
        run: |
          if [[ ! "${TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid release tag '${TAG}'. Expected vMAJOR.MINOR.PATCH." >&2
            exit 1
          fi

      - name: Verify successful CI run on tagged commit
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_SHA: ${{ github.sha }}
        run: |
          API_URL="https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/runs?head_sha=${TARGET_SHA}&status=completed&per_page=100"
          SUCCESS_COUNT="$(
            curl -fsSL \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "${API_URL}" \
            | jq '[.workflow_runs[] | select(.path == ".github/workflows/ci.yml" and .conclusion == "success")] | length'
          )"

          if [[ "${SUCCESS_COUNT}" -eq 0 ]]; then
            echo "No successful ci.yml run found for commit ${TARGET_SHA}. Release is blocked." >&2
            exit 1
          fi

      - name: Checkout tagged commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: front/package-lock.json

      - name: Build backend artifact
        working-directory: back
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon clean build -x test

      - name: Build frontend artifact
        working-directory: front
        run: |
          npm ci
          npm run build

      - name: Package release artifacts
        id: assets
        env:
          TAG: ${{ github.ref_name }}
        run: |
          JAR_PATH="$(ls back/build/libs/*.jar | head -n 1)"
          BACK_ASSET="microcrm-back-${TAG}.jar"
          FRONT_ASSET="microcrm-front-${TAG}.tar.gz"

          cp "${JAR_PATH}" "${BACK_ASSET}"
          tar -czf "${FRONT_ASSET}" -C front/dist/microcrm/browser .

          echo "back_asset=${BACK_ASSET}" >> "${GITHUB_OUTPUT}"
          echo "front_asset=${FRONT_ASSET}" >> "${GITHUB_OUTPUT}"

      - name: Resolve image names
        id: images
        run: |
          OWNER="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          REPO="$(echo "${GITHUB_REPOSITORY#*/}" | tr '[:upper:]' '[:lower:]')"
          echo "back=ghcr.io/${OWNER}/${REPO}-back" >> "${GITHUB_OUTPUT}"
          echo "front=ghcr.io/${OWNER}/${REPO}-front" >> "${GITHUB_OUTPUT}"

      - name: Build Docker images (local)
        env:
          TAG: ${{ github.ref_name }}
          BACK_IMAGE: ${{ steps.images.outputs.back }}
          FRONT_IMAGE: ${{ steps.images.outputs.front }}
        run: |
          docker build --target back -t "${BACK_IMAGE}:${TAG}" .
          docker build --target front -t "${FRONT_IMAGE}:${TAG}" .

      - name: Login to GHCR
        env:
          GH_TOKEN: ${{ github.token }}
        run: echo "${GH_TOKEN}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Push Docker images
        env:
          TAG: ${{ github.ref_name }}
          BACK_IMAGE: ${{ steps.images.outputs.back }}
          FRONT_IMAGE: ${{ steps.images.outputs.front }}
        run: |
          docker push "${BACK_IMAGE}:${TAG}"
          docker push "${FRONT_IMAGE}:${TAG}"
          docker tag "${BACK_IMAGE}:${TAG}" "${BACK_IMAGE}:latest"
          docker tag "${FRONT_IMAGE}:${TAG}" "${FRONT_IMAGE}:latest"
          docker push "${BACK_IMAGE}:latest"
          docker push "${FRONT_IMAGE}:latest"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          target_commitish: ${{ github.sha }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: false
          files: |
            ${{ steps.assets.outputs.back_asset }}
            ${{ steps.assets.outputs.front_asset }}

      - name: Roll back tag/release on failure
        if: ${{ failure() }}
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          echo "Release failed. Rolling back tag ${TAG}."

          if gh release view "${TAG}" > /dev/null 2>&1; then
            gh release delete "${TAG}" --yes || true
          fi

          gh api -X DELETE "repos/${GITHUB_REPOSITORY}/git/refs/tags/${TAG}" || true
