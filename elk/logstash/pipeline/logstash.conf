input {
  beats {
    port => 5044
  }
}

filter {
  # Add common service metadata so logs stay identifiable even when the payload is minimal.
  mutate {
    add_field => {
      "[service][name]" => "microcrm"
      "[service][type]" => "standalone"
      "[event][module]" => "supervisor"
    }
  }

  # Parse Spring Boot structured JSON logs when present and keep non-JSON runtime logs as-is.
  json {
    source => "message"
    tag_on_failure => []
  }

  if [level] {
    # Move the application log level into a normalized nested field.
    mutate {
      rename => {
        "level" => "[log][level]"
      }
    }
  }

  if [log][level] {
    # Normalize severity values to a consistent uppercase format.
    mutate {
      uppercase => [ "[log][level]" ]
    }
  }

  if [logger_name] {
    # Store the logger name under the standard log namespace.
    mutate {
      rename => {
        "logger_name" => "[log][logger]"
      }
    }
  }

  if [thread_name] {
    # Preserve the emitting thread name in a structured process field.
    mutate {
      rename => {
        "thread_name" => "[process][thread][name]"
      }
    }
  }

  if [log][file][path] {
    # Tag events collected from Docker log files to make their ingestion path explicit.
    mutate {
      add_field => {
        "[labels][log_source]" => "docker-filebeat"
      }
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "microcrm-logs-%{+YYYY.MM.dd}"
  }

  stdout {
    codec => rubydebug
  }
}
