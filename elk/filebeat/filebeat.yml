filebeat.inputs:
  - type: container
    enabled: true
    paths:
      - /var/lib/docker/containers/*/*.log
    processors:
      - add_docker_metadata:
          host: "unix:///var/run/docker.sock"
      - drop_event:
          when:
            not:
              contains:
                container.name: "monitoring"

processors:
  - add_host_metadata: ~

output.logstash:
  hosts: ["logstash:5044"]
